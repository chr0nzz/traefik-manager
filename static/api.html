<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference – Traefik Manager</title>
  <script>
    (function() {
      const pref = localStorage.getItem('tm-theme') || 'dark';
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      window._tmIsDark = pref === 'dark' || (pref === 'system' && systemDark);
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding-top: 40px; }
    #tm-app { height: calc(100vh - 40px); }
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      z-index: 99999;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }
    #topbar a {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s;
    }
    #topbar span {
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
  </style>
  <script>
    (function() {
      const isDark = window._tmIsDark;
      const bg = isDark ? '#0d1117' : '#ffffff';
      const border = isDark ? '#30363d' : '#d0d7de';
      const text = isDark ? '#e6edf3' : '#1f2328';
      const muted = isDark ? '#8b949e' : '#656d76';
      const s = document.createElement('style');
      s.textContent = `#topbar{background:${bg};border-bottom:1px solid ${border}}#topbar a{color:${muted}}#topbar a:hover{color:${text}}#topbar span{color:${muted}}`;
      document.head.appendChild(s);
    })();
  </script>
</head>
<body>
  <div id="topbar">
    <a href="/">← Dashboard</a>
    <span>/</span>
    <span>API Reference</span>
  </div>
  <div id="tm-app"></div>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    const _isDark = window._tmIsDark;
    Scalar.createApiReference('#tm-app', {
      url: '/static/openapi.yaml',
      theme: 'none',
      forceDarkModeState: _isDark ? 'dark' : 'light',
      hideDarkModeToggle: true,
      servers: [{ url: window.location.origin, description: 'This Traefik Manager instance' }],
      customCss: _isDark ? `
        .dark-mode {
          --scalar-background-1: #0d1117;
          --scalar-background-2: #161b22;
          --scalar-background-3: #1c2128;
          --scalar-color-1: #e6edf3;
          --scalar-color-2: #8b949e;
          --scalar-color-3: #656d76;
          --scalar-color-accent: #24a1de;
          --scalar-border-color: #30363d;
          --scalar-background-accent: rgba(36,161,222,0.1);
        }
      ` : `
        .light-mode {
          --scalar-background-1: #f6f8fa;
          --scalar-background-2: #ffffff;
          --scalar-background-3: #eaeef2;
          --scalar-color-1: #1f2328;
          --scalar-color-2: #656d76;
          --scalar-color-3: #8b949e;
          --scalar-color-accent: #0969da;
          --scalar-border-color: #d0d7de;
          --scalar-background-accent: rgba(9,105,218,0.1);
        }
      `
    });
  </script>
</body>
</html>
