site_name: Traefik Manager
site_url: https://traefik-manager.xyzlab.dev
site_description: Manage and monitor Traefik routes, middlewares, services, and providers through a clean web UI.
docs_dir: docs
repo_url: https://github.com/chr0nzz/traefik-manager
repo_name: traefik-manager
edit_uri: ""

theme:
  name: material
  logo: images/icon.png
  favicon: images/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Docker: docker.md
    - Podman: podman.md
    - Linux (native): linux.md
  - Management:
    - Routes: tab-routes.md
    - Middlewares: tab-middlewares.md
    - Services: tab-services.md
  - Monitoring:
    - Certificates: tab-certs.md
    - Plugins: tab-plugins.md
    - Logs: tab-logs.md
  - Providers:
    - Docker: tab-docker.md
    - Kubernetes: tab-kubernetes.md
    - Swarm: tab-swarm.md
    - Nomad: tab-nomad.md
    - ECS: tab-ecs.md
    - Consul Catalog: tab-consulcatalog.md
    - Redis: tab-redis.md
    - etcd: tab-etcd.md
    - Consul KV: tab-consul.md
    - ZooKeeper: tab-zookeeper.md
    - HTTP Provider: tab-http_provider.md
    - File (External): tab-file_external.md
  - Configuration:
    - manager.yml: manager-yml.md
    - Environment Variables: env-vars.md
  - Operations:
    - Reset Password: reset-password.md
  - UI Examples: ui-examples.md
