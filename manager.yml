# ─────────────────────────────────────────────────────────────────────────────
# Traefik Manager — manager.yml
# This file is managed by the app. You can also edit it manually.
# Restart the container after any manual changes.
# ─────────────────────────────────────────────────────────────────────────────

# ── Domains ───────────────────────────────────────────────────────────────────
domains:
  - example.com

# ── Certificate Resolver ──────────────────────────────────────────────────────
cert_resolver: cloudflare

# ── Traefik API URL ───────────────────────────────────────────────────────────
traefik_api_url: http://traefik:8080

# ── Authentication ────────────────────────────────────────────────────────────
# Set to false if using external auth (Authentik, Authelia, Traefik basicAuth).
# AUTH_ENABLED env var takes priority over this field.
auth_enabled: true

# ── Password Hash ─────────────────────────────────────────────────────────────
# Set automatically by the app. DO NOT edit manually unless pre-configuring.
# If left empty the app auto-generates a temporary password on startup and
# prints it to the container logs. You can also pre-set a bcrypt hash here
# (use: python -c "import bcrypt; print(bcrypt.hashpw(b'yourpw', bcrypt.gensalt()).decode())")
# and set setup_complete: true to skip the setup wizard entirely.
password_hash: ""

# ── Visible Tabs ──────────────────────────────────────────────────────────────
# Show or hide optional tabs. Routes, Middlewares, and Services are always on.
# Toggle these in the Settings modal or edit here and restart.
visible_tabs:
  # Infrastructure
  docker: false
  kubernetes: false
  # Orchestrators
  swarm: false
  nomad: false
  ecs: false
  consulcatalog: false
  # KV stores
  redis: false
  etcd: false
  consul: false
  zookeeper: false
  # Config providers
  http_provider: false
  file_external: false
  # System
  certs: false
  plugins: false
  logs: false

# ── Setup State ───────────────────────────────────────────────────────────────
# Managed automatically by the app. Do not edit unless pre-configuring.
# must_change_password: true forces a password-change on next login (set by
#   auto-generation or `flask reset-password`).
# setup_complete: true skips the setup wizard (set after wizard finishes, or
#   set manually when pre-configuring this file).
must_change_password: false
setup_complete: false
