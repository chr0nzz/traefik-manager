<div id="mwModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:620px">
        <form id="mwForm" action="{{ url_for('save_middleware') }}" method="POST" onsubmit="saveMwAjax(event)">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="isMwEdit" id="isMwEdit" value="false">
            <input type="hidden" name="originalMwId" id="originalMwId" value="">
            <input type="hidden" name="configFile" id="mwConfigFile" value="">

            <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid var(--border)">
                <div class="flex items-center gap-2">
                    <i class="ph-bold ph-plugs-connected" style="color:var(--purple)"></i>
                    <h3 class="font-bold text-sm" style="color:var(--text)" id="mwModalTitle">Add Middleware</h3>
                </div>
                <button type="button" onclick="closeMwModal()" class="btn-icon"><i class="ph-bold ph-x text-sm"></i></button>
            </div>

            <div class="px-5 py-4 space-y-4">
                {% if multi_config or config_dir_set %}
                <div>
                    <label>Config File</label>
                    <select id="mwConfigFileSelect" class="input-field" onchange="onMwConfigFileChange(this)">
                        <option value="">Select a file...</option>
                        {% if config_dir_set %}
                        <option value="__new__">+ New file...</option>
                        {% endif %}
                        {% for cp in config_paths_list %}
                        <option value="{{ cp.label }}">{{ cp.label }}</option>
                        {% endfor %}
                    </select>
                    {% if config_dir_set %}
                    <input type="text" id="newMwFileName" class="input-field mt-2" placeholder="middlewares-myauth.yml" style="display:none" oninput="document.getElementById('mwConfigFile').value=this.value">
                    {% endif %}
                </div>
                {% endif %}
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label>Name</label>
                        <input type="text" name="middlewareName" id="middlewareName" required class="input-field" placeholder="my-auth">
                    </div>
                    <div>
                        <label>Template</label>
                        <select id="mwTemplate" onchange="applyMwTemplate(this)" class="input-field">
                            <option value="">Custom…</option>
                            <optgroup label="Auth">
                                <option value="basicAuth">Basic Auth</option>
                                <option value="digestAuth">Digest Auth</option>
                                <option value="forwardAuth">Forward Auth</option>
                                <option value="forwardAuthAuthentik">Forward Auth (Authentik)</option>
                                <option value="forwardAuthAuthelia">Forward Auth (Authelia)</option>
                            </optgroup>
                            <optgroup label="Security">
                                <option value="ipAllowList">IP Allow List</option>
                                <option value="ipAllowListPrivate">IP Allow List (Private Ranges)</option>
                                <option value="rateLimit">Rate Limit</option>
                                <option value="secureHeaders">Secure Headers</option>
                                <option value="corsHeaders">CORS Headers</option>
                            </optgroup>
                            <optgroup label="Routing">
                                <option value="redirectScheme">Redirect to HTTPS</option>
                                <option value="redirectRegex">Redirect Regex</option>
                                <option value="stripPrefix">Strip Prefix</option>
                                <option value="addPrefix">Add Prefix</option>
                                <option value="replacePath">Replace Path</option>
                            </optgroup>
                            <optgroup label="Advanced">
                                <option value="compress">Gzip Compress</option>
                                <option value="retry">Retry</option>
                                <option value="circuitBreaker">Circuit Breaker</option>
                                <option value="buffering">Buffering</option>
                                <option value="chain">Middleware Chain</option>
                                <option value="inFlightReq">In-Flight Limit</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                <div>
                    <label>Configuration (YAML)</label>
                    <div id="mwEditorContainer" class="rounded-lg overflow-hidden" style="height:260px;border:1px solid var(--border)"></div>
                    <textarea name="middlewareContent" id="middlewareContent" required style="display:none"></textarea>
                </div>
            </div>

            <div class="flex justify-end gap-2 px-5 py-4" style="border-top:1px solid var(--border)">
                <button type="button" onclick="closeMwModal()" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Middleware</button>
            </div>
        </form>
    </div>
</div>
