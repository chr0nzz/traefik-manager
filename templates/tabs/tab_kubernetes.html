<div id="tab-kubernetes" class="tab-content">
    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="kubernetesSearch" oninput="filterKubernetes()" placeholder="Search Kubernetes routes..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="filterKubernetes('all')"  id="k8s-all"  class="proto-btn active-http text-xs px-3 py-1.5">All</button>
            <button onclick="filterKubernetes('http')" id="k8s-http" class="proto-btn text-xs px-3 py-1.5">HTTP</button>
            <button onclick="filterKubernetes('tcp')"  id="k8s-tcp"  class="proto-btn text-xs px-3 py-1.5">TCP</button>
        </div>
        <button onclick="refreshKubernetesTab()" class="btn-secondary text-xs">
            <i class="ph-bold ph-arrows-clockwise"></i> Refresh
        </button>
    </div>
    <div class="mb-4 px-3 py-2 rounded-lg text-xs flex items-center gap-2" style="background:rgba(36,161,222,0.08);border:1px solid rgba(36,161,222,0.2);color:var(--blue)">
        <i class="ph-bold ph-info"></i>
        These routes are managed by Kubernetes (CRD, Ingress, or Gateway API) and are read-only. Edit them via your Kubernetes resources.
    </div>
    <div id="kubernetesContent">
        <div class="text-center py-16" style="color:var(--muted)">
            <i class="ph-light ph-spinner-gap text-4xl block mb-3 animate-spin opacity-40"></i>
            <p>Loading Kubernetes routes...</p>
        </div>
    </div>
</div>

<script>
let _allKubernetesRoutes = [];
let _kubernetesFilter    = 'all';

const _K8S_PROVIDERS = new Set(['kubernetescrd', 'kubernetes', 'kubernetesgateway']);

async function refreshKubernetesTab() {
    const container = document.getElementById('kubernetesContent');
    container.innerHTML = `<div class="text-center py-16" style="color:var(--muted)"><i class="ph-light ph-spinner-gap text-4xl block mb-3 animate-spin opacity-40"></i><p>Loading Kubernetes routes...</p></div>`;

    try {
        const routerRes = await fetch('/api/traefik/routers').then(r => r.json());

        const http = (routerRes.http || []).map(r => ({ ...r, _proto: 'HTTP' }));
        const tcp  = (routerRes.tcp  || []).map(r => ({ ...r, _proto: 'TCP'  }));
        const udp  = (routerRes.udp  || []).map(r => ({ ...r, _proto: 'UDP'  }));
        const all  = [...http, ...tcp, ...udp];

        const getProvider = r => r.provider || (r.name || '').split('@')[1] || '';

        _allKubernetesRoutes = all
            .filter(r => _K8S_PROVIDERS.has(getProvider(r)))
            .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

        if (all.length === 0) {
            container.innerHTML = `<div class="text-center py-16 rounded-xl" style="color:var(--muted);border:1px solid var(--border)"><i class="ph-light ph-plug-slash text-5xl block mb-3 opacity-30"></i><p class="font-medium">Traefik API not reachable</p><p class="text-xs mt-1">Configure <code class="font-mono">TRAEFIK_API_URL</code> in Settings</p></div>`;
            return;
        }
        if (_allKubernetesRoutes.length === 0) {
            container.innerHTML = `<div class="text-center py-16 rounded-xl" style="color:var(--muted);border:1px solid var(--border)"><i class="ph-light ph-circles-three text-5xl block mb-3 opacity-30"></i><p class="font-medium">No Kubernetes routes found</p><p class="text-xs mt-1">Routes discovered via Kubernetes CRD, Ingress, or Gateway API will appear here</p></div>`;
            return;
        }

        document.getElementById('kubernetesTabCount').textContent = _allKubernetesRoutes.length;
        renderKubernetesRoutes();
    } catch(e) {
        container.innerHTML = `<div class="text-center py-16 rounded-xl" style="color:var(--muted);border:1px solid var(--border)"><i class="ph-light ph-plug-slash text-5xl block mb-3 opacity-30"></i><p class="font-medium">Traefik API not reachable</p></div>`;
    }
}

function filterKubernetes(f) {
    if (f) {
        _kubernetesFilter = f;
        ['all', 'http', 'tcp'].forEach(k => {
            const btn = document.getElementById('k8s-' + k);
            if (btn) btn.classList.toggle('active-http', k === f);
        });
    }
    renderKubernetesRoutes();
}

function renderKubernetesRoutes() {
    const search = (document.getElementById('kubernetesSearch')?.value || '').toLowerCase();
    const items  = _allKubernetesRoutes.filter(r => {
        if (_kubernetesFilter !== 'all' && r._proto.toLowerCase() !== _kubernetesFilter) return false;
        if (search && !(r.name || '').toLowerCase().includes(search) && !(r.rule || '').toLowerCase().includes(search)) return false;
        return true;
    });

    const statusDot = r => {
        const st = (r.status || '').toLowerCase();
        if (st === 'enabled')  return `<span class="status-dot status-online"></span>`;
        if (st === 'disabled' || st === 'error') return `<span class="status-dot status-offline"></span>`;
        return `<span class="status-dot status-unknown"></span>`;
    };

    const protoBadge = r => {
        if (r._proto === 'HTTP') return `<span class="badge badge-http" style="font-size:9px">HTTP</span>`;
        if (r._proto === 'TCP')  return `<span class="badge badge-tcp"  style="font-size:9px">TCP</span>`;
        return `<span class="badge badge-udp" style="font-size:9px">UDP</span>`;
    };

    const providerBadge = r => {
        const p = r.provider || (r.name || '').split('@')[1] || '';
        const labels = { kubernetescrd: 'CRD', kubernetes: 'Ingress', kubernetesgateway: 'Gateway' };
        const label = labels[p] || p;
        return `<span class="badge badge-muted" style="font-size:9px">${label}</span>`;
    };

    const shortName = r => (r.name || '').split('@')[0];

    const tlsBadge = r => r.tls
        ? `<span class="badge badge-green" style="font-size:9px"><i class="ph-bold ph-lock"></i> TLS</span>`
        : '';

    const epBadges = r => (r.entryPoints || [])
        .map(ep => `<span class="badge badge-muted" style="font-size:9px">${ep}</span>`)
        .join(' ');

    const namespaceBadge = r => r.namespace
        ? `<span class="badge badge-muted" style="font-size:9px"><i class="ph-bold ph-folder-simple"></i> ${r.namespace}</span>`
        : '';

    if (items.length === 0) {
        document.getElementById('kubernetesContent').innerHTML =
            `<div class="text-center py-12 rounded-xl" style="color:var(--muted);border:1px solid var(--border)">No routes match filter</div>`;
        return;
    }

    const cards = items.map(r => {
        const globalIdx = _allKubernetesRoutes.indexOf(r);
        return `
        <div class="card p-4 hover:border-blue-500/40 transition-all" style="border-color:var(--border)">
            <div class="flex items-start justify-between gap-3 mb-3">
                <div class="flex items-center gap-2 min-w-0">
                    ${statusDot(r)}
                    ${protoBadge(r)}
                    <span class="font-bold text-sm truncate" style="color:var(--text)" title="${shortName(r)}">${shortName(r)}</span>
                </div>
                <div class="flex items-center gap-1 shrink-0">
                    ${tlsBadge(r)}
                    ${providerBadge(r)}
                    <button onclick="openKubernetesRouteDetail(${globalIdx})" class="btn-icon" title="View details" style="padding:4px 6px">
                        <i class="ph-bold ph-info text-sm"></i>
                    </button>
                </div>
            </div>
            <div class="space-y-2">
                <div class="rounded-md px-3 py-2 text-xs font-mono truncate" style="background:var(--bg);border:1px solid var(--border);color:var(--green)" title="${r.rule || '—'}">${r.rule || '—'}</div>
                <div class="flex items-center justify-between text-xs">
                    <span style="color:var(--muted)">Service</span>
                    <span class="font-mono truncate ml-2" style="color:var(--text);max-width:200px" title="${r.service || '—'}">${(r.service || '—').split('@')[0]}</span>
                </div>
                ${r.namespace ? `
                <div class="flex items-center justify-between text-xs">
                    <span style="color:var(--muted)">Namespace</span>
                    <span class="font-mono truncate ml-2" style="color:var(--muted);max-width:200px">${r.namespace}</span>
                </div>` : ''}
                ${r.entryPoints?.length ? `<div class="flex items-center gap-1 flex-wrap">${epBadges(r)}</div>` : ''}
            </div>
        </div>`;
    }).join('');

    document.getElementById('kubernetesContent').innerHTML =
        `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${cards}</div>`;
}

async function openKubernetesRouteDetail(idx) {
    const r = _allKubernetesRoutes[idx];
    if (!r) return;

    document.getElementById('detailEditBtn').style.display = 'none';

    const provider = r.provider || (r.name || '').split('@')[1] || 'kubernetes';
    const labels = { kubernetescrd: 'CRD', kubernetes: 'Ingress', kubernetesgateway: 'Gateway' };
    const providerLabel = labels[provider] || provider;
    const k8sBadge = `<span class="badge badge-muted ml-2" style="font-size:10px"><i class="ph-bold ph-circles-three" style="font-size:9px"></i> k8s/${providerLabel}</span>`;

    const svcRaw  = r.service || '';
    const appData = {
        id:           (r.name || '').split('@')[0],
        name:         (r.name || '').split('@')[0],
        rule:         r.rule || '',
        service_name: svcRaw.split('@')[0],
        target:       'N/A',
        middlewares:  r.middlewares || [],
        entryPoints:  r.entryPoints || [],
        protocol:     r._proto.toLowerCase(),
    };

    await openRouteDetail(appData.name, appData.protocol, appData);

    document.getElementById('detailEditBtn').style.display = 'none';

    document.getElementById('detailTitle').insertAdjacentHTML('afterend', k8sBadge);
}
</script>
