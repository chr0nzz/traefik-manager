<div id="tab-live" class="tab-content">
    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="svcSearch" oninput="filterServices()" placeholder="Search services..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:#0d1117; border:1px solid var(--border)">
            <button onclick="filterServices('all')" id="sf-all" class="proto-btn active-http text-xs px-3 py-1.5">All</button>
            <button onclick="filterServices('success')" id="sf-success" class="proto-btn text-xs px-3 py-1.5">Success</button>
            <button onclick="filterServices('warning')" id="sf-warning" class="proto-btn text-xs px-3 py-1.5">Warnings</button>
            <button onclick="filterServices('error')" id="sf-error" class="proto-btn text-xs px-3 py-1.5">Errors</button>
        </div>
        <button onclick="refreshLiveView()" class="btn-secondary text-xs">
            <i class="ph-bold ph-arrows-clockwise"></i> Refresh
        </button>
    </div>

    <div id="liveContent">
        <div class="text-center py-16" style="color:var(--muted)">
            <i class="ph-light ph-spinner-gap text-4xl block mb-3 animate-spin opacity-40"></i>
            <p>Loading services...</p>
        </div>
    </div>
</div>
