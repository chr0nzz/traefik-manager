<div id="tab-live" class="tab-content">
    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="svcSearch" oninput="filterServices()" placeholder="Search services..." class="input-field pl-9">
        </div>
        <div class="live-dd" id="dd-status">
            <button class="live-dd-btn" id="dd-status-btn" onclick="toggleLiveDd('dd-status')">
                <span id="dd-status-label">All Status</span>
                <i class="ph-bold ph-caret-down live-dd-caret"></i>
            </button>
            <div class="live-dd-menu" id="dd-status-menu">
                <button class="live-dd-item active" onclick="pickLiveStatus('all','All Status')">All Status</button>
                <button class="live-dd-item" onclick="pickLiveStatus('success','Success')">Success</button>
                <button class="live-dd-item" onclick="pickLiveStatus('warning','Warnings')">Warnings</button>
                <button class="live-dd-item" onclick="pickLiveStatus('error','Errors')">Errors</button>
            </div>
        </div>
        <div class="live-dd" id="dd-proto">
            <button class="live-dd-btn" id="dd-proto-btn" onclick="toggleLiveDd('dd-proto')">
                <span id="dd-proto-label">All Protocols</span>
                <i class="ph-bold ph-caret-down live-dd-caret"></i>
            </button>
            <div class="live-dd-menu" id="dd-proto-menu">
                <button class="live-dd-item active" onclick="pickLiveProto('all','All Protocols')">All Protocols</button>
            </div>
        </div>
        <div class="live-dd" id="dd-provider">
            <button class="live-dd-btn" id="dd-provider-btn" onclick="toggleLiveDd('dd-provider')">
                <span id="dd-provider-label">All Providers</span>
                <i class="ph-bold ph-caret-down live-dd-caret"></i>
            </button>
            <div class="live-dd-menu" id="dd-provider-menu">
                <button class="live-dd-item active" onclick="pickLiveProvider('all','All Providers')">All Providers</button>
            </div>
        </div>
        <button onclick="clearLiveFilters()" class="btn-secondary text-xs">
            <i class="ph-bold ph-x-circle"></i> Clear
        </button>
        <button onclick="refreshLiveView()" class="btn-secondary text-xs">
            <i class="ph-bold ph-arrows-clockwise"></i> Refresh
        </button>
    </div>

    <div id="liveContent">
        <div class="text-center py-16" style="color:var(--muted)">
            <i class="ph-light ph-spinner-gap text-4xl block mb-3 animate-spin opacity-40"></i>
            <p>Loading services...</p>
        </div>
    </div>
</div>
