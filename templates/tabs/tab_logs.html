<div id="tab-logs" class="tab-content">
    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg);border:1px solid var(--border)">
            <button onclick="setLogLines(100)"  id="log-100"  class="proto-btn active-http text-xs px-3 py-1.5">100</button>
            <button onclick="setLogLines(200)"  id="log-200"  class="proto-btn text-xs px-3 py-1.5">200</button>
            <button onclick="setLogLines(500)"  id="log-500"  class="proto-btn text-xs px-3 py-1.5">500</button>
            <button onclick="setLogLines(1000)" id="log-1000" class="proto-btn text-xs px-3 py-1.5">1000</button>
        </div>
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="logSearch" oninput="filterLogs()" placeholder="Filter logs..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="refreshLogs()" class="proto-btn text-xs px-3 py-1.5" title="Refresh"><i class="ph-bold ph-arrows-clockwise"></i></button>
        </div>
    </div>
    <div id="logsContent">
        <div class="text-center py-16" style="color:var(--muted)">
            <i class="ph-light ph-terminal text-5xl block mb-3 opacity-30"></i>
            <p class="font-medium">Access logs not loaded</p>
            <p class="text-xs mt-1">Configure <code class="font-mono">Access Log Path</code> in Settings</p>
        </div>
    </div>
</div>

<div class="detail-backdrop" id="logDetailBackdrop" onclick="closeLogDetail()"></div>
<div class="detail-panel" id="logDetailPanel">
    <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid var(--border);flex-shrink:0">
        <div class="flex items-center gap-2">
            <i class="ph-bold ph-file-text" style="color:var(--blue)"></i>
            <h3 class="font-bold text-sm" style="color:var(--text)">Log Detail</h3>
        </div>
        <button onclick="closeLogDetail()" class="btn-icon"><i class="ph-bold ph-x text-sm"></i></button>
    </div>
    <div class="px-6 py-5 overflow-y-auto" style="display:flex;flex-direction:column;gap:16px">
        <div class="flex gap-2 flex-wrap" id="ldBadges"></div>
        <div class="rounded-lg overflow-hidden" style="border:1px solid var(--border)">
            <div id="ldGrid"></div>
        </div>
        <div>
            <p class="text-xs font-medium mb-2" style="color:var(--muted)">Raw Line</p>
            <div class="rounded-lg p-3 overflow-x-auto" style="background:var(--input-bg);border:1px solid var(--border)">
                <pre id="ldRaw" class="text-xs font-mono whitespace-pre" style="color:var(--muted);user-select:text"></pre>
            </div>
        </div>
    </div>
</div>
