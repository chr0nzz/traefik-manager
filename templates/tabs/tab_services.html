<div id="tab-services" class="tab-content active">

    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="searchRoutes" oninput="filterRoutes()" placeholder="Search routes..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg fb-secondary" style="background:var(--input-bg); border:1px solid var(--border)">
            <div class="live-dd" id="dd-route-domain">
                <button class="live-dd-btn-inner" id="dd-route-domain-btn" onclick="toggleLiveDd('dd-route-domain')">
                    <span id="dd-route-domain-label">All Domains</span>
                    <i class="ph-bold ph-caret-down live-dd-caret"></i>
                </button>
                <div class="live-dd-menu" id="dd-route-domain-menu">
                    <button class="live-dd-item active" onclick="pickRouteDomain('','All Domains')">All Domains</button>
                    {% for d in domains %}
                    <button class="live-dd-item" onclick="pickRouteDomain('{{ d }}','{{ d }}')">{{ d }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="flex gap-1 p-1 rounded-lg fb-secondary" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="filterRouteStatus('all')"      id="filterStatus-all"      class="proto-btn active-http text-xs px-3 py-1.5">All</button>
            <button onclick="filterRouteStatus('active')"   id="filterStatus-active"   class="proto-btn text-xs px-3 py-1.5">Active</button>
            <button onclick="filterRouteStatus('inactive')" id="filterStatus-inactive" class="proto-btn text-xs px-3 py-1.5">Inactive</button>
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="filterProto('all')" id="filterAll" class="proto-btn active-http text-xs px-3 py-1.5">All</button>
            <button onclick="filterProto('http')" id="filterHTTP" class="proto-btn text-xs px-3 py-1.5">HTTP</button>
            <button onclick="filterProto('tcp')" id="filterTCP" class="proto-btn text-xs px-3 py-1.5">TCP</button>
            <button onclick="filterProto('udp')" id="filterUDP" class="proto-btn text-xs px-3 py-1.5">UDP</button>
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="pingAllRoutes()" class="proto-btn text-xs px-3 py-1.5" title="Ping all HTTP routes">
                <i class="ph-bold ph-heartbeat"></i>
            </button>
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="toggleRouteView()" id="routeViewToggle" class="proto-btn text-xs px-3 py-1.5" title="Toggle view">
                <i class="ph-bold ph-list" id="routeViewIcon"></i>
            </button>
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="toggleBulkMode()" id="bulkModeBtn" class="proto-btn text-xs px-3 py-1.5" title="Bulk select">
                <i class="ph-bold ph-selection"></i>
            </button>
        </div>
    </div>

    <div id="bulkBar" style="display:none;position:sticky;bottom:16px;z-index:50;margin-top:12px">
        <div class="flex items-center gap-2 px-4 py-3 rounded-xl" style="background:var(--card-bg);border:1px solid var(--blue);box-shadow:0 4px 24px rgba(0,0,0,0.3)">
            <span id="bulkCount" class="text-sm font-semibold" style="color:var(--text)">0 selected</span>
            <div class="flex-1"></div>
            <button onclick="bulkEnable()" class="proto-btn active-http text-xs px-3 py-1.5" style="border-radius:6px"><i class="ph-bold ph-toggle-right" style="margin-right:4px"></i>Enable</button>
            <button onclick="bulkDisable()" class="proto-btn text-xs px-3 py-1.5" style="border-radius:6px"><i class="ph-bold ph-toggle-left" style="margin-right:4px"></i>Disable</button>
            <button onclick="bulkDelete()" class="proto-btn text-xs px-3 py-1.5" style="border-radius:6px;color:var(--red)"><i class="ph-bold ph-trash" style="margin-right:4px"></i>Delete</button>
            <button onclick="toggleBulkMode()" class="btn-icon" title="Exit bulk mode"><i class="ph-bold ph-x text-sm"></i></button>
        </div>
    </div>

    <div id="configErrorBanner" style="display:none;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px"></div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="routeGrid"></div>
</div>
