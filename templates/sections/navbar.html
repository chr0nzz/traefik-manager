<nav class="sticky top-0 z-40" style="position:relative">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">

            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <img src="/static/icons/icon.png" alt="logo" style="width:24px;height:24px">
                    <span class="font-bold text-base tracking-tight" style="color:var(--text)">Traefik <span style="color:var(--blue)">Manager</span></span>
                </div>
            </div>

            <div class="hidden sm:flex items-center gap-2">
                <button id="versionBadge" class="hidden nav-btn font-mono" title="Traefik version">
                    <span id="apiStatusDot" style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0"></span>
                    <i class="ph-bold ph-git-branch"></i>
                    <span id="versionText">-</span>
                </button>
                <div id="updateBadge" class="hidden"></div>
                <button id="tmVersionBadge" class="hidden nav-btn font-mono" title="Traefik Manager version">
                    <i class="ph-bold ph-package"></i>
                    <span id="tmVersionText">-</span>
                </button>
                <a href="https://traefik-manager.xyzlab.dev" target="_blank" rel="noopener" class="nav-btn nav-docs-link" title="Documentation">
                    <i class="ph-bold ph-book-open"></i>
                </a>
                <div class="notif-bell-wrap" id="notifBellWrap">
                    <button onclick="toggleNotifPanel()" class="nav-btn" id="notifBellBtn" title="Notifications">
                        <i class="ph-bold ph-bell"></i>
                        <span id="notifBadge" class="notif-badge hidden"></span>
                    </button>
                </div>
                <button onclick="cycleTheme()" id="themeToggleBtn" class="nav-btn" title="Toggle theme">
                    <i class="ph-bold ph-moon" id="themeIcon"></i>
                </button>
                <button onclick="openSettingsModal()" class="nav-btn" title="Settings">
                    <i class="ph-bold ph-gear"></i>
                </button>
                {% if auth_enabled %}
                <form method="POST" action="{{ url_for('logout') }}" style="display:inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="nav-btn" title="Sign out" style="color:var(--muted)">
                        <i class="ph-bold ph-sign-out"></i>
                    </button>
                </form>
                {% endif %}
                <button onclick="openMwModal()" class="nav-btn" title="Add Middleware">
                    <i class="ph-bold ph-plugs-connected"></i>
                    <span>Middleware</span>
                </button>
                <button onclick="openModal()" class="nav-btn nav-btn-primary">
                    <i class="ph-bold ph-plus"></i>
                    <span>Add Route</span>
                </button>
            </div>

            <div class="flex sm:hidden items-center gap-2">
                <div id="versionBadgeMobile" class="hidden items-center gap-1 px-2 py-1 rounded-md text-xs font-mono" style="background:var(--btn-secondary-bg); border:1px solid var(--border); color:var(--muted)">
                    <span id="apiStatusDotMobile" style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>
                    <i class="ph-bold ph-git-branch text-xs"></i>
                    <span id="versionTextMobile">-</span>
                </div>
                <div id="tmVersionBadgeMobile" class="hidden items-center gap-1 px-2 py-1 rounded-md text-xs font-mono" style="background:var(--btn-secondary-bg); border:1px solid var(--border); color:var(--muted)">
                    <i class="ph-bold ph-package text-xs"></i>
                    <span id="tmVersionTextMobile">-</span>
                </div>
                <a href="https://traefik-manager.xyzlab.dev" target="_blank" rel="noopener" class="btn-icon nav-docs-link" title="Documentation">
                    <i class="ph-bold ph-book-open text-lg"></i>
                </a>
                <div class="notif-bell-wrap" id="notifBellWrapMobile">
                    <button onclick="toggleNotifPanel()" class="btn-icon" id="notifBellBtnMobile" title="Notifications">
                        <i class="ph-bold ph-bell text-lg"></i>
                        <span id="notifBadgeMobile" class="notif-badge hidden"></span>
                    </button>
                </div>
                <button onclick="toggleMobileMenu()" class="btn-icon" id="hamburgerBtn">
                    <i class="ph-bold ph-list text-xl" id="hamburgerIcon"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="notif-panel" id="notifPanel">
        <div class="notif-panel-header">
            <span class="notif-panel-title">Notifications</span>
            <div class="flex items-center gap-2">
                <button onclick="markNotifsRead()" class="notif-mark-read" id="notifMarkRead">Mark all read</button>
                <button onclick="clearAllNotifications()" class="notif-mark-read notif-clear-all" id="notifClearAll" style="color:var(--muted);display:none">Clear all</button>
            </div>
        </div>
        <div id="notifList" class="notif-list">
            <div class="notif-empty"><i class="ph-light ph-bell-slash" style="font-size:32px;opacity:0.3;display:block;margin-bottom:8px"></i>No notifications yet</div>
        </div>
    </div>
</nav>
