name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check [existing issues](https://github.com/chr0nzz/traefik-manager/issues) to avoid duplicates.
        For security vulnerabilities, use [private reporting](https://github.com/chr0nzz/traefik-manager/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Traefik Manager version
      placeholder: "e.g. v1.0.0-beta3.2"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How are you running Traefik Manager?
      options:
        - Docker
        - Podman
        - Linux (native)
        - Unraid
        - Other
    validations:
      required: true

  - type: input
    id: traefik_version
    attributes:
      label: Traefik version
      placeholder: "e.g. v3.3.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Docker logs, browser console errors, or screenshots. Redact any sensitive values.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Compose snippet, env vars, or dynamic config (redact secrets).
      render: yaml
